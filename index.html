<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You Rotator</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
</head>
<body>
  <h1 class="title has-text-centered">Thank You Rotator</h1>
  <div class="container">
    <div class="field">
      <label class="label">Thank You Text</label>
      <div class="control">
        <input class="input" id="text-input" type="text" placeholder="Enter text" value="TY">
      </div>
    </div>

    <div class="field">
      <label class="label">Max Font Size</label>
      <div class="control">
        <input class="input" id="font-size-input" type="number" placeholder="Max font size" value="180" min="1">
      </div>
    </div>

    <div class="field is-grouped">
      <div class="control">
        <button class="button is-primary">Previous</button>
      </div>
      <div class="control">
        <span class="button is-static">Frame: 0</span>
      </div>
      <div class="control">
        <button class="button is-primary">Next</button>
      </div>
    </div>

    <div class="canvas-container">
      <canvas id="frame-canvas" width="500" height="500"></canvas>
    </div>
  </div>
  <script type="module" src="/app.js"></script>
</body>
</html>
